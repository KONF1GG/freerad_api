
services:
  app:
    build: .
    restart: always
    container_name: 'radius_core'
    ports:
      - '8080:8000'
    env_file:
      - ".env"
    environment:
      - SERVICE_NAME=radius-core
      - ENVIRONMENT=dev
      - LOG_LEVEL=info
    volumes:
      - app-logs:/var/log/stdout
    command: ["uv", "run", "main.py"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
      - app-logs:/var/log/stdout:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    depends_on:
      - loki

volumes:
  app-logs:
  loki-data:

