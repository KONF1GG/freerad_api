server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: radius-core
          host: ${HOSTNAME}
          __path__: /var/log/*.log
  pipeline_stages:
    - json:
      expressions:
      ts: ts
      level: level
      service: service
      env: env
      logger: logger
      request_id: request_id
      trace_id: trace_id
      method: method
      path: path
    - labels:
      level:
      service:
      env:
      logger:
    - timestamp:
      source: ts
      format: RFC3339
  - job_name: stdout
    static_configs:
      - targets:
          - localhost
        labels:
          job: radius-core-stdout
          host: ${HOSTNAME}
          __path__: /var/log/stdout/*.log
  pipeline_stages:
    - json:
      expressions:
      ts: ts
      level: level
      service: service
      env: env
      logger: logger
      request_id: request_id
      trace_id: trace_id
      method: method
      path: path
    - labels:
      level:
      service:
      env:
      logger:
    - timestamp:
      source: ts
      format: RFC3339
